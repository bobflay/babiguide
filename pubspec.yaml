name: babiguide_mobile
description: "BabiGuide — guide d'Abidjan (restaurants, hôtels, commerces)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  dio: ^5.7.0
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  geolocator: ^13.0.4
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/babiguide-logo.png"
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  web:
    generate: true
    image_path: "assets/images/babiguide-logo.png"
    background_color: "#FFFFFF"
    theme_color: "#F18F4D"
